<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Planner — Neda Abdolghani</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a1f;
      --ink-muted: #4a4a55;
      --ink-light: #6b6b78;
      --paper: #ffffff;
      transition: background 0.35s ease;
    }

    /* Day — pastel pink */
    body[data-theme="day"] {
      --accent: #c97b8a;
      --accent-soft: #fce8ef;
      --accent-hover: #a85f6e;
      --border: #f0d0da;
      --sidebar: #fff5f8;
      --main-bg: #fffbfc;
      --success: #b86b7a;
      --success-soft: #fde8ef;
      --done-border: #e8b4c0;
      --done-hover: #fddae4;
      --highlight: #fde8ef;
      --hover-border: #e8b4c0;
      --focus-ring: rgba(201, 123, 138, 0.18);
      --pulse-ring: rgba(201, 123, 138, 0.3);
      --page-shadow: rgba(201, 123, 138, 0.12);
      --body-bg: #f8eef1;
    }

    /* Week — purple */
    body[data-theme="week"] {
      --accent: #7c5cbf;
      --accent-soft: #ede7f8;
      --accent-hover: #6244a3;
      --border: #ddd0f0;
      --sidebar: #f8f5fd;
      --main-bg: #fdfbff;
      --success: #6b52a8;
      --success-soft: #ebe3f9;
      --done-border: #c4b0e4;
      --done-hover: #ddd0f5;
      --highlight: #ebe3f9;
      --hover-border: #c4b0e4;
      --focus-ring: rgba(124, 92, 191, 0.18);
      --pulse-ring: rgba(124, 92, 191, 0.3);
      --page-shadow: rgba(124, 92, 191, 0.12);
      --body-bg: #f0ebf8;
    }

    /* Month — green */
    body[data-theme="month"] {
      --accent: #4a9b6f;
      --accent-soft: #e3f5ec;
      --accent-hover: #357a55;
      --border: #c8e6d4;
      --sidebar: #f4fbf7;
      --main-bg: #fafffb;
      --success: #2d7a52;
      --success-soft: #d8f3e4;
      --done-border: #95d5b2;
      --done-hover: #c7eed8;
      --highlight: #dceee3;
      --hover-border: #95d5b2;
      --focus-ring: rgba(74, 155, 111, 0.18);
      --pulse-ring: rgba(74, 155, 111, 0.3);
      --page-shadow: rgba(74, 155, 111, 0.12);
      --body-bg: #eaf3ee;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 15px;
    }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      color: var(--ink);
      background: var(--body-bg);
      line-height: 1.55;
      min-height: 100vh;
      padding: 2rem 1rem;
      transition: background 0.35s ease;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      background: var(--paper);
      box-shadow: 0 4px 24px var(--page-shadow);
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 720px;
      transition: box-shadow 0.35s ease;
    }

    /* Sidebar */
    .sidebar {
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      transition: background 0.35s ease, border-color 0.35s ease;
    }

    .planner-header h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 1.65rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 0.25rem;
    }

    .planner-header p {
      font-size: 0.82rem;
      color: var(--ink-muted);
    }

    .sidebar-section h2 {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
      padding-bottom: 0.35rem;
      border-bottom: 2px solid var(--accent);
      transition: color 0.35s ease, border-color 0.35s ease;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.35rem;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.3rem;
    }

    .tab-btn {
      flex: 1;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ink-muted);
      padding: 0.5rem 0.4rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }

    .tab-btn:hover {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
    }

    body[data-theme="day"] .tab-btn[data-tab="day"]:not(.active),
    body[data-theme="week"] .tab-btn[data-tab="week"]:not(.active),
    body[data-theme="month"] .tab-btn[data-tab="month"]:not(.active) {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .tab-btn:active {
      transform: scale(0.97);
    }

    /* Form */
    .task-form {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .form-field label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--ink-light);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .form-field input {
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.55rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--paper);
      color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
    }

    .add-btn {
      margin-top: 0.25rem;
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.65rem 1rem;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .add-btn:hover {
      background: var(--accent-hover);
    }

    .add-btn:active {
      transform: scale(0.98);
    }

    .memory-note {
      font-size: 0.75rem;
      color: var(--ink-light);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .memory-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
    }

    /* Main panel */
    .main {
      padding: 2rem 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--main-bg);
      transition: background 0.35s ease;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .panel-header h2 {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .period-label {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--ink);
    }

    .nav-btns {
      display: flex;
      gap: 0.35rem;
    }

    .nav-btn {
      border: 1px solid var(--border);
      background: var(--paper);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .nav-btn:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
    }

    .task-groups {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .task-group-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--ink-light);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--border);
    }

    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--paper);
      cursor: default;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .task-item:hover {
      background: var(--highlight);
      border-color: var(--hover-border);
      box-shadow: 0 2px 8px var(--page-shadow);
      transform: translateX(3px);
    }

    .task-item.done {
      background: var(--success-soft);
      border-color: var(--done-border);
    }

    .task-item.done:hover {
      background: var(--done-hover);
    }

    .task-item.just-completed {
      animation: completePulse 0.55s ease;
    }

    @keyframes completePulse {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.02); box-shadow: 0 0 0 4px var(--pulse-ring); }
      100% { transform: scale(1); }
    }

    .task-checkbox {
      appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid var(--accent);
      border-radius: 5px;
      flex-shrink: 0;
      margin-top: 1px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      position: relative;
    }

    .task-checkbox:hover {
      background: var(--accent-soft);
    }

    .task-checkbox:checked {
      background: var(--success);
      border-color: var(--success);
    }

    .task-checkbox:checked::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 1px;
      width: 5px;
      height: 10px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .task-checkbox:active {
      transform: scale(0.9);
    }

    .task-body {
      flex: 1;
      min-width: 0;
    }

    .task-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--ink);
      word-break: break-word;
      transition: color 0.2s;
    }

    .task-item.done .task-title {
      text-decoration: line-through;
      color: var(--ink-light);
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      margin-top: 0.35rem;
    }

    .task-meta span {
      font-size: 0.75rem;
      color: var(--ink-muted);
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .task-meta svg {
      color: var(--accent);
      flex-shrink: 0;
    }

    .delete-btn {
      border: none;
      background: transparent;
      color: var(--ink-light);
      font-size: 1.1rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.15rem 0.35rem;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s, background 0.2s;
    }

    .task-item:hover .delete-btn {
      opacity: 1;
    }

    .delete-btn:hover {
      color: #c1121f;
      background: #fde8ea;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--ink-light);
      font-size: 0.88rem;
    }

    .empty-state svg {
      margin-bottom: 0.75rem;
      opacity: 0.45;
    }

    .stats-bar {
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--ink-light);
    }

    .stats-bar strong {
      color: var(--accent);
    }

    @media (max-width: 720px) {
      .page {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
</head>
<body data-theme="day">

  <div class="page">
    <aside class="sidebar">
      <div class="planner-header">
        <h1>Task Planner</h1>
        <p>Organize by day, week, or month</p>
      </div>

      <section class="sidebar-section">
        <h2>View</h2>
        <div class="tabs" role="tablist">
          <button class="tab-btn active" data-tab="day" role="tab" aria-selected="true">Day</button>
          <button class="tab-btn" data-tab="week" role="tab" aria-selected="false">Week</button>
          <button class="tab-btn" data-tab="month" role="tab" aria-selected="false">Month</button>
        </div>
      </section>

      <section class="sidebar-section">
        <h2>New Task</h2>
        <form class="task-form" id="taskForm">
          <div class="form-field">
            <label for="taskTitle">Task</label>
            <input type="text" id="taskTitle" placeholder="What needs to be done?" required autocomplete="off">
          </div>
          <div class="form-row">
            <div class="form-field">
              <label for="taskCost">Cost</label>
              <input type="text" id="taskCost" placeholder="e.g. $50" autocomplete="off">
            </div>
            <div class="form-field">
              <label for="taskTime">Time required</label>
              <input type="text" id="taskTime" placeholder="e.g. 2 hrs" autocomplete="off">
            </div>
          </div>
          <div class="form-field">
            <label for="taskDate">Date</label>
            <input type="date" id="taskDate" required>
          </div>
          <button type="submit" class="add-btn">Add Task</button>
        </form>
      </section>

      <p class="memory-note">
        <span class="memory-dot" aria-hidden="true"></span>
        Saved in browser memory (localStorage)
      </p>
    </aside>

    <main class="main">
      <div class="panel-header">
        <div>
          <h2>Tasks</h2>
          <p class="period-label" id="periodLabel"></p>
        </div>
        <div class="nav-btns">
          <button class="nav-btn" id="prevBtn" aria-label="Previous period">← Prev</button>
          <button class="nav-btn" id="todayBtn">Today</button>
          <button class="nav-btn" id="nextBtn" aria-label="Next period">Next →</button>
        </div>
      </div>

      <div class="task-groups" id="taskGroups"></div>

      <div class="stats-bar">
        <span><strong id="doneCount">0</strong> completed</span>
        <span><strong id="totalCount">0</strong> total in view</span>
      </div>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "neda-task-planner-v1";

    let tasks = loadTasks();
    let activeTab = "day";
    let anchorDate = startOfDay(new Date());

    const taskForm = document.getElementById("taskForm");
    const taskTitle = document.getElementById("taskTitle");
    const taskCost = document.getElementById("taskCost");
    const taskTime = document.getElementById("taskTime");
    const taskDate = document.getElementById("taskDate");
    const taskGroups = document.getElementById("taskGroups");
    const periodLabel = document.getElementById("periodLabel");
    const doneCount = document.getElementById("doneCount");
    const totalCount = document.getElementById("totalCount");

    taskDate.value = formatDateInput(new Date());

    function setTheme(tab) {
      document.body.dataset.theme = tab;
    }

    document.querySelectorAll(".tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach((b) => {
          b.classList.remove("active");
          b.setAttribute("aria-selected", "false");
        });
        btn.classList.add("active");
        btn.setAttribute("aria-selected", "true");
        activeTab = btn.dataset.tab;
        setTheme(activeTab);
        render();
      });
    });

    document.getElementById("prevBtn").addEventListener("click", () => {
      if (activeTab === "day") anchorDate = addDays(anchorDate, -1);
      else if (activeTab === "week") anchorDate = addDays(anchorDate, -7);
      else anchorDate = addMonths(anchorDate, -1);
      render();
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      if (activeTab === "day") anchorDate = addDays(anchorDate, 1);
      else if (activeTab === "week") anchorDate = addDays(anchorDate, 7);
      else anchorDate = addMonths(anchorDate, 1);
      render();
    });

    document.getElementById("todayBtn").addEventListener("click", () => {
      anchorDate = startOfDay(new Date());
      render();
    });

    taskForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const title = taskTitle.value.trim();
      if (!title) return;

      tasks.push({
        id: crypto.randomUUID(),
        title,
        cost: taskCost.value.trim(),
        time: taskTime.value.trim(),
        date: taskDate.value,
        done: false,
        createdAt: Date.now(),
      });

      saveTasks();
      taskForm.reset();
      taskDate.value = formatDateInput(new Date());
      anchorDate = startOfDay(parseDate(taskDate.value));
      render();
      taskTitle.focus();
    });

    function loadTasks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function startOfDay(d) {
      const x = new Date(d);
      x.setHours(0, 0, 0, 0);
      return x;
    }

    function parseDate(str) {
      const [y, m, d] = str.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function formatDateInput(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function addDays(d, n) {
      const x = new Date(d);
      x.setDate(x.getDate() + n);
      return startOfDay(x);
    }

    function addMonths(d, n) {
      const x = new Date(d);
      x.setMonth(x.getMonth() + n);
      return startOfDay(x);
    }

    function startOfWeek(d) {
      const x = startOfDay(d);
      const day = x.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      return addDays(x, diff);
    }

    function endOfWeek(d) {
      return addDays(startOfWeek(d), 6);
    }

    function startOfMonth(d) {
      return startOfDay(new Date(d.getFullYear(), d.getMonth(), 1));
    }

    function endOfMonth(d) {
      return startOfDay(new Date(d.getFullYear(), d.getMonth() + 1, 0));
    }

    function sameDay(a, b) {
      return a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate();
    }

    function formatDisplayDate(d) {
      return d.toLocaleDateString("en-US", {
        weekday: "short",
        month: "short",
        day: "numeric",
        year: "numeric",
      });
    }

    function formatShortDate(d) {
      return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
    }

    function getTasksInRange(start, end) {
      return tasks
        .filter((t) => {
          const td = parseDate(t.date);
          return td >= start && td <= end;
        })
        .sort((a, b) => {
          const da = parseDate(a.date) - parseDate(b.date);
          if (da !== 0) return da;
          return a.createdAt - b.createdAt;
        });
    }

    function playCompleteFeedback() {
      if (navigator.vibrate) navigator.vibrate([12, 40, 12]);

      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = "sine";
        osc.frequency.setValueAtTime(523.25, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(784, ctx.currentTime + 0.12);
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.25);
      } catch (_) {}
    }

    function toggleTask(id, checkbox, itemEl) {
      const task = tasks.find((t) => t.id === id);
      if (!task) return;

      const wasDone = task.done;
      task.done = checkbox.checked;
      saveTasks();

      if (task.done && !wasDone) {
        itemEl.classList.add("just-completed");
        playCompleteFeedback();
        setTimeout(() => itemEl.classList.remove("just-completed"), 600);
      }

      itemEl.classList.toggle("done", task.done);
      updateStats();
    }

    function deleteTask(id) {
      tasks = tasks.filter((t) => t.id !== id);
      saveTasks();
      render();
    }

    function createTaskItem(task) {
      const li = document.createElement("li");
      li.className = "task-item" + (task.done ? " done" : "");
      li.dataset.id = task.id;

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.className = "task-checkbox";
      checkbox.checked = task.done;
      checkbox.setAttribute("aria-label", `Mark "${task.title}" as ${task.done ? "incomplete" : "complete"}`);
      checkbox.addEventListener("change", () => toggleTask(task.id, checkbox, li));

      const body = document.createElement("div");
      body.className = "task-body";

      const title = document.createElement("div");
      title.className = "task-title";
      title.textContent = task.title;

      const meta = document.createElement("div");
      meta.className = "task-meta";

      const dateSpan = document.createElement("span");
      dateSpan.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${formatDisplayDate(parseDate(task.date))}`;
      meta.appendChild(dateSpan);

      if (task.time) {
        const timeSpan = document.createElement("span");
        timeSpan.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${escapeHtml(task.time)}`;
        meta.appendChild(timeSpan);
      }

      if (task.cost) {
        const costSpan = document.createElement("span");
        costSpan.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> ${escapeHtml(task.cost)}`;
        meta.appendChild(costSpan);
      }

      body.appendChild(title);
      body.appendChild(meta);

      const del = document.createElement("button");
      del.className = "delete-btn";
      del.type = "button";
      del.setAttribute("aria-label", `Delete "${task.title}"`);
      del.textContent = "×";
      del.addEventListener("click", () => deleteTask(task.id));

      li.appendChild(checkbox);
      li.appendChild(body);
      li.appendChild(del);
      return li;
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function renderEmpty(message) {
      taskGroups.innerHTML = `
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
          <p>${message}</p>
        </div>`;
      doneCount.textContent = "0";
      totalCount.textContent = "0";
    }

    function renderDayView() {
      const day = startOfDay(anchorDate);
      periodLabel.textContent = formatDisplayDate(day);
      const filtered = getTasksInRange(day, day);

      if (!filtered.length) {
        renderEmpty("No tasks for this day. Add one in the sidebar.");
        return;
      }

      taskGroups.innerHTML = "";
      const ul = document.createElement("ul");
      ul.className = "task-list";
      filtered.forEach((t) => ul.appendChild(createTaskItem(t)));
      taskGroups.appendChild(ul);
      updateStats(filtered);
    }

    function renderWeekView() {
      const start = startOfWeek(anchorDate);
      const end = endOfWeek(anchorDate);
      periodLabel.textContent = `${formatShortDate(start)} – ${formatShortDate(end)}`;

      const filtered = getTasksInRange(start, end);
      if (!filtered.length) {
        renderEmpty("No tasks this week. Add one with a date in this range.");
        return;
      }

      taskGroups.innerHTML = "";
      for (let i = 0; i < 7; i++) {
        const day = addDays(start, i);
        const dayTasks = filtered.filter((t) => sameDay(parseDate(t.date), day));
        if (!dayTasks.length) continue;

        const group = document.createElement("div");
        const heading = document.createElement("h3");
        heading.className = "task-group-title";
        heading.textContent = formatShortDate(day);
        group.appendChild(heading);

        const ul = document.createElement("ul");
        ul.className = "task-list";
        dayTasks.forEach((t) => ul.appendChild(createTaskItem(t)));
        group.appendChild(ul);
        taskGroups.appendChild(group);
      }
      updateStats(filtered);
    }

    function renderMonthView() {
      const start = startOfMonth(anchorDate);
      const end = endOfMonth(anchorDate);
      periodLabel.textContent = anchorDate.toLocaleDateString("en-US", { month: "long", year: "numeric" });

      const filtered = getTasksInRange(start, end);
      if (!filtered.length) {
        renderEmpty("No tasks this month. Add one with a date in this month.");
        return;
      }

      taskGroups.innerHTML = "";

      let weekStart = startOfWeek(start);
      while (weekStart <= end) {
        const weekEnd = endOfWeek(weekStart);
        const rangeStart = weekStart < start ? start : weekStart;
        const rangeEnd = weekEnd > end ? end : weekEnd;
        const weekTasks = filtered.filter((t) => {
          const td = parseDate(t.date);
          return td >= rangeStart && td <= rangeEnd;
        });

        if (weekTasks.length) {
          const group = document.createElement("div");
          const heading = document.createElement("h3");
          heading.className = "task-group-title";
          heading.textContent = `Week of ${formatShortDate(rangeStart)}`;
          group.appendChild(heading);

          const ul = document.createElement("ul");
          ul.className = "task-list";
          weekTasks.forEach((t) => ul.appendChild(createTaskItem(t)));
          group.appendChild(ul);
          taskGroups.appendChild(group);
        }

        weekStart = addDays(weekStart, 7);
      }
      updateStats(filtered);
    }

    function updateStats(list) {
      const items = list || [];
      doneCount.textContent = String(items.filter((t) => t.done).length);
      totalCount.textContent = String(items.length);
    }

    function render() {
      if (activeTab === "day") renderDayView();
      else if (activeTab === "week") renderWeekView();
      else renderMonthView();
    }

    setTheme(activeTab);
    render();
  </script>
</body>
</html>
